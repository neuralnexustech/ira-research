<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRA Research HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: hsl(224, 25%, 8%);
      --bg-card: rgba(30, 41, 59, 0.45);
      --border-color: rgba(147, 51, 234, 0.15);
      --border-hover: rgba(147, 51, 234, 0.35);
      --primary: hsl(271, 91%, 65%);
      --accent: hsl(190, 90%, 50%);
      --success: hsl(142, 70%, 45%);
      --danger: hsl(350, 80%, 55%);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      background: linear-gradient(to bottom, var(--bg-dark), hsl(224, 25%, 12%));
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header styling with status dot */
    header {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.6);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    .status-badge.connected .status-dot {
      background-color: var(--success);
      box-shadow: 0 0 10px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; box-shadow: 0 0 4px var(--success); }
      50% { opacity: 1; box-shadow: 0 0 12px var(--success); }
      100% { opacity: 0.6; box-shadow: 0 0 4px var(--success); }
    }

    /* Cards block */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
    }

    /* Metrics Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric-box {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .metric-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: #ffffff;
    }

    .metric-lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* Tab Controls Button group */
    .mode-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      background: rgba(15, 23, 42, 0.6);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mode-btn {
      font-family: 'Outfit', sans-serif;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .mode-btn.active {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(147, 51, 234, 0.25);
    }

    /* Quick Inputs */
    .input-bar {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 12px;
      color: #ffffff;
      font-size: 0.85rem;
      font-family: 'Outfit', sans-serif;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-action {
      background: linear-gradient(135deg, var(--primary), hsl(271, 91%, 70%));
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-action:hover {
      box-shadow: 0 4px 12px rgba(147, 51, 234, 0.3);
    }

    /* Secondary actions list */
    .btn-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-hover);
    }

    .btn-outline svg {
      width: 16px;
      height: 16px;
      stroke: var(--accent);
    }

    /* Logger Terminal style console */
    .terminal {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
    }

    .log-line {
      line-height: 1.4;
      word-break: break-all;
    }

    .log-line.info { color: #38bdf8; }
    .log-line.success { color: #4ade80; }
    .log-line.warn { color: #facc15; }
    .log-line.error { color: #f87171; }
    .log-line.timestamp { color: var(--text-muted); margin-right: 4px; }

    /* Pulse emergency shutdown button */
    .btn-abort {
      background: linear-gradient(135deg, var(--danger), hsl(350, 80%, 62%));
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-abort:hover {
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
      transform: scale(1.01);
    }

    .btn-abort svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <!-- HUD Header -->
  <header>
    <div class="brand">
      <h2 class="brand-title">IRA Research</h2>
      <span class="brand-subtitle">Agent Controller HUD</span>
    </div>
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusTxt">Disconnected</span>
    </div>
  </header>

  <!-- Telemetry Card -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      Telemetry Statistics
    </div>
    <div class="metrics-grid">
      <div class="metric-box">
        <span class="metric-val" id="activeTabId">None</span>
        <span class="metric-lbl">Active Tab</span>
      </div>
      <div class="metric-box">
        <span class="metric-val" id="bufferCount">0</span>
        <span class="metric-lbl">Traced Logs</span>
      </div>
    </div>
  </div>

  <!-- Mouse Modes Selection -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
      Automation Target Profile
    </div>
    <div class="mode-group">
      <button class="mode-btn active" id="stealthModeBtn">Stealth</button>
      <button class="mode-btn" id="preciseModeBtn">Precise</button>
      <button class="mode-btn" id="standardModeBtn">Delay</button>
    </div>
  </div>

  <!-- Command Actions Bar -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
      Direct Manual Overrides
    </div>
    <div class="input-bar">
      <input type="text" id="navUrl" placeholder="Enter target navigation URL...">
      <button class="btn-action" id="navBtn">Navigate</button>
    </div>
    <div class="btn-list">
      <button class="btn-outline" id="snapBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        Capture High-Fidelity Screenshot
      </button>
      <button class="btn-outline" id="treeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-2-2h-5l-2-3H9a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2z"></path></svg>
        Generate Accessibility Tree
      </button>
    </div>
  </div>

  <!-- Events Log Terminal -->
  <div class="card" style="flex: 1;">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
      Live Activity Telemetry
    </div>
    <div class="terminal" id="termConsole">
      <div class="log-line info"><span class="log-line timestamp">[09:59:00]</span>System startup: IRA HUD initialised.</div>
    </div>
  </div>

  <!-- Pulsing Critical Shutdown Button -->
  <button class="btn-abort" id="abortBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
    Emergency Stop Agent
  </button>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
